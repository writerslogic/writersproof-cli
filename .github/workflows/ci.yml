name: CI

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - '**.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  check:
    name: Check & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libxcb1-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy lints
        # Not --all-features: the protocol crate's `wasm` feature pulls the
        # nightly-only `ratchet` crate, which fails to compile on stable.
        run: cargo clippy --workspace -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libxcb1-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run tests
        # Not --all-features: the protocol crate's `wasm` feature pulls the
        # nightly-only `ratchet` crate, which fails to compile on stable.
        run: cargo test --workspace

      - name: Run tests with release optimizations
        run: cargo test --release --workspace

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Run cargo-audit
        run: cargo audit
        continue-on-error: true

      - name: Run cargo-deny
        run: cargo deny check
        continue-on-error: true

  reproducible-build:
    name: Reproducible Build Verification
    runs-on: ubuntu-latest
    needs: [check]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev libtss2-dev libxcb1-dev

      - name: Build #1
        run: |
          cargo build --release
          sha256sum target/release/libwriterslogic_core.* > /tmp/build1.sha256 || true

      - name: Clean and rebuild
        run: |
          cargo clean
          cargo build --release
          sha256sum target/release/libwriterslogic_core.* > /tmp/build2.sha256 || true

      - name: Compare builds
        run: |
          echo "Build 1 hashes:"
          cat /tmp/build1.sha256 || echo "No library built"
          echo "Build 2 hashes:"
          cat /tmp/build2.sha256 || echo "No library built"

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs: [check, test, security]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All quality gates passed"
