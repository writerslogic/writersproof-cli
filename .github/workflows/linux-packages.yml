name: Linux Packages

on:
  push:
    branches: [main]
    paths:
      - 'apps/cpoe_cli/packaging/linux/**'
      - 'apps/cpoe_cli/src/**'
      - 'crates/**'
  pull_request:
    paths:
      - 'apps/cpoe_cli/packaging/linux/**'
  schedule:
    - cron: '0 6 * * 1' # Weekly on Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-appimage:
    name: Build AppImage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libxcb1-dev \
            libfuse2 desktop-file-utils

      - name: Build release binary
        run: cargo build --release -p cpoe_cli

      - name: Build AppImage
        run: |
          chmod +x apps/cpoe_cli/packaging/linux/scripts/build-appimage.sh
          apps/cpoe_cli/packaging/linux/scripts/build-appimage.sh

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: appimage
          path: build/appimage/*.AppImage

  build-deb:
    name: Build Debian Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libxcb1-dev \
            dpkg-dev debhelper devscripts

      - name: Build release binary
        run: cargo build --release -p cpoe_cli

      - name: Build Debian package
        run: |
          chmod +x apps/cpoe_cli/packaging/linux/scripts/build-deb.sh
          apps/cpoe_cli/packaging/linux/scripts/build-deb.sh

      - name: Upload Debian package
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: deb-package
          path: build/deb/*.deb

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libtss2-dev libsqlite3-dev libxcb1-dev \
            rpm rpmbuild

      - name: Build release binary
        run: cargo build --release -p cpoe_cli

      - name: Build RPM package
        run: |
          chmod +x apps/cpoe_cli/packaging/linux/scripts/build-rpm.sh
          apps/cpoe_cli/packaging/linux/scripts/build-rpm.sh

      - name: Upload RPM package
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: rpm-package
          path: build/rpm/RPMS/**/*.rpm
