name: Update Package Managers

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.1)'
        required: true

permissions:
  contents: read

jobs:
  update-homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download macOS binary artifacts and compute hashes
        id: hashes
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          BASE="https://github.com/writerslogic/writersproof-cli/releases/download/${TAG}"

          curl -sSfL -o arm64.tar.gz "${BASE}/writersproof-cli-${TAG}-aarch64-apple-darwin.tar.gz"
          curl -sSfL -o x86_64.tar.gz "${BASE}/writersproof-cli-${TAG}-x86_64-apple-darwin.tar.gz"

          echo "sha_arm=$(sha256sum arm64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "sha_x86=$(sha256sum x86_64.tar.gz | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          repository: writerslogic/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "tag": "${{ steps.release.outputs.tag }}",
              "version": "${{ steps.release.outputs.version }}",
              "sha256_arm": "${{ steps.hashes.outputs.sha_arm }}",
              "sha256_x86": "${{ steps.hashes.outputs.sha_x86 }}"
            }

  update-scoop:
    name: Update Scoop Manifest
    runs-on: ubuntu-latest
    steps:
      - name: Get release info
        id: release
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.event.release.tag_name }}"
          fi
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download Windows artifact and compute hash
        id: hash
        run: |
          TAG="${{ steps.release.outputs.tag }}"
          URL="https://github.com/writerslogic/writersproof-cli/releases/download/${TAG}/writersproof-cli-${TAG}-x86_64-pc-windows-msvc.zip"
          curl -sSfL -o windows.zip "$URL"
          SHA256=$(sha256sum windows.zip | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Checkout scoop-bucket
        uses: actions/checkout@v4
        with:
          repository: writerslogic/scoop-bucket
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: scoop-bucket

      - name: Update manifest
        run: |
          cd scoop-bucket
          TAG="${{ steps.release.outputs.tag }}"
          VERSION="${{ steps.release.outputs.version }}"
          SHA256="${{ steps.hash.outputs.sha256 }}"
          URL="${{ steps.hash.outputs.url }}"

          cat > writersproof.json << MANIFEST
          {
              "\$schema": "https://raw.githubusercontent.com/ScoopInstaller/Scoop/master/schema.json",
              "version": "${VERSION}",
              "description": "Cryptographic authorship witnessing for writers and creators",
              "homepage": "https://writerslogic.com",
              "license": "AGPL-3.0-only",
              "architecture": {
                  "64bit": {
                      "url": "${URL}",
                      "hash": "${SHA256}"
                  }
              },
              "bin": [
                  "writersproof-cli.exe"
              ],
              "checkver": {
                  "github": "https://github.com/writerslogic/writersproof-cli"
              },
              "autoupdate": {
                  "architecture": {
                      "64bit": {
                          "url": "https://github.com/writerslogic/writersproof-cli/releases/download/v\$version/writersproof-cli-v\$version-x86_64-pc-windows-msvc.zip",
                          "hash": {
                              "url": "https://github.com/writerslogic/writersproof-cli/releases/download/v\$version/writersproof-cli-v\$version-x86_64-pc-windows-msvc.zip.sha256",
                              "regex": "([a-f0-9]{64})\\s+writersproof-cli-v\\$version-x86_64-pc-windows-msvc\\.zip"
                          }
                      }
                  }
              }
          }
          MANIFEST

      - name: Commit and push
        run: |
          cd scoop-bucket
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add writersproof.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "CPoE ${{ steps.release.outputs.tag }}"
            git push
          fi
