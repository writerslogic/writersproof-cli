# git-cliff — autonomous changelog generated from Conventional Commits.
# https://git-cliff.org

[changelog]
postprocessors = [
  { pattern = "cpop", replace = "cpoe" },
  { pattern = "Cpop", replace = "Cpoe" },
  { pattern = "CPOP", replace = "CPOE" },
  { pattern = "CPoP", replace = "CPoE" },
  { pattern = "proof-of-process", replace = "proof-of-effort" },
  { pattern = "Proof of Process", replace = "Proof of Effort" },
]
header = """
# Changelog

All notable changes to this project are generated from the commit history.
Format: [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) +
[Conventional Commits](https://www.conventionalcommits.org/).
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | upper_first }}
{% for commit in commits %}\
- {{ commit.message | upper_first }}
{% endfor %}\
{% endfor %}
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "Added" },
  { message = "^fix", group = "Fixed" },
  { message = "^perf", group = "Performance" },
  { message = "^refactor", group = "Changed" },
  { message = "^security", group = "Security" },
  { message = "^docs", group = "Documentation" },
  { message = "^test", skip = true },
  { message = "^chore", skip = true },
  { message = "^ci", skip = true },
  { message = "^build", skip = true },
]
filter_commits = false
tag_pattern = "v?[0-9]*"
topo_order = false
sort_commits = "newest"
